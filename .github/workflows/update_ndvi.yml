# ══════════════════════════════════════
# 3. Evalscript لحساب NDVI من Sentinel-2
# ══════════════════════════════════════
EVALSCRIPT_NDVI = """
//VERSION=3
function setup() {
  return {
    input: [{ bands: ["B04", "B08", "dataMask"] }],
    output: [
      { id: "ndvi", bands: 1, sampleType: "FLOAT32" },
      { id: "dataMask", bands: 1, sampleType: "UINT8" }
    ]
  };
}

function evaluatePixel(samples) {
  let ndvi = (samples.B08 - samples.B04) / (samples.B08 + samples.B04);
  return {
    ndvi: [ndvi],
    dataMask: [samples.dataMask]
  };
}
"""


# ══════════════════════════════════════
# 4. دالة سحب NDVI لبيفوت واحد
# ══════════════════════════════════════
def fetch_ndvi_for_pivot(pivot_name, pivot_data, start_date, end_date, config):
    """
    تسحب متوسط NDVI لبيفوت واحد خلال فترة زمنية محددة.
    تُرجع قائمة من {'date': ..., 'ndvi': ...}
    """
    print(f"  جاري سحب بيانات {pivot_name}...")

    # بناء GeoJSON polygon
    geometry = Geometry(
        geometry={
            "type": "Polygon",
            "coordinates": [pivot_data["polygon"]]
        },
        crs=CRS.WGS84
    )

    # طلب Statistical API
    request = SentinelHubStatistical(
        aggregation=SentinelHubStatistical.aggregation(
            evalscript=EVALSCRIPT_NDVI,
            time_interval=(start_date, end_date),
            aggregation_interval="P5D",   # كل 5 أيام
            size=[512, 512],
        ),
        input_data=[
            SentinelHubStatistical.input_data(
                DataCollection.SENTINEL2_L2A.define_from(
                    name="s2l2a",
                    service_url="https://sh.dataspace.copernicus.eu"
                ),
                other_args={"dataFilter": {"maxCloudCoverage": 20}},  # تجاهل صور فيها غيوم > 20%
            ),
        ],
        geometry=geometry,
        config=config,
    )

    try:
        response = request.get_data()
    except Exception as e:
        print(f"    ❌ خطأ في {pivot_name}: {e}")
        return []

    results = []
    if response and len(response) > 0:
        for item in response[0].get("data", []):
            interval = item.get("interval", {})
            date_str = interval.get("from", "")[:10]  # YYYY-MM-DD
            stats = item.get("outputs", {}).get("ndvi", {}).get("bands", {}).get("B0", {}).get("stats", {})
            mean_ndvi = stats.get("mean")

            if mean_ndvi is not None and mean_ndvi > -1:  # تجاهل القيم الفاسدة (no data)
                # تقريب إلى خانتين عشريتين
                mean_ndvi = round(mean_ndvi, 2)
                # تحويل من YYYY-MM-DD إلى M/D/YYYY (تنسيق الداشبورد)
                dt = datetime.strptime(date_str, "%Y-%m-%d")
                formatted = f"{dt.month}/{dt.day}/{dt.year}"
                results.append({
                    "date": formatted,
                    "date_iso": date_str,
                    "ndvi": mean_ndvi,
                    "pivot": pivot_name,
                    "crop": pivot_data["crop"],
                    "variety": pivot_data["variety"],
                })

    print(f"    ✅ {len(results)} قراءة مجلوبة")
    return results


# ══════════════════════════════════════
# 5. سحب جميع البيفوت
# ══════════════════════════════════════
def fetch_all_pivots(months_back=3):
    """
    يسحب NDVI لجميع البيفوت خلال آخر N شهر.
    """
    end_date   = datetime.now()
    start_date = end_date - timedelta(days=30 * months_back)

    start_str = start_date.strftime("%Y-%m-%d")
    end_str   = end_date.strftime("%Y-%m-%d")

    print(f"\n{'='*60}")
    print(f"مشروع القمة الزراعي — سحب NDVI من Copernicus Sentinel-2")
    print(f"الفترة: {start_str} → {end_str}")
    print(f"عدد البيفوت: {len(PIVOTS)}")
    print(f"{'='*60}\n")

    all_records = []

    for pivot_name, pivot_data in PIVOTS.items():
        records = fetch_ndvi_for_pivot(
            pivot_name, pivot_data,
            start_str, end_str,
            config
        )
        all_records.extend(records)

    if not all_records:
        print("\n⚠️  لم يتم جلب أي بيانات. تحقق من Client ID و Client Secret.")
        return None

    # تحويل إلى DataFrame
    df = pd.DataFrame(all_records)
    df = df.sort_values(["pivot", "date_iso"]).reset_index(drop=True)

    return df


# ══════════════════════════════════════
# 6. حفظ البيانات وتوليد JS للداشبورد
# ══════════════════════════════════════
def save_results(df):
    # حفظ CSV
    csv_path = "ndvi_data.csv"
    df[["date", "crop", "pivot", "ndvi"]].to_csv(csv_path, index=False, encoding="utf-8-sig")
    print(f"\n✅ تم الحفظ: {csv_path}")

    # توليد مصفوفة JavaScript جاهزة للداشبورد
    js_records = []
    for _, row in df.iterrows():
        js_records.append(
            f'  {{d:"{row["date"]}",c:"{row["crop"]}",p:"{row["pivot"]}",v:{row["ndvi"]}}}'
        )
    js_array = "const D=[\n" + ",\n".join(js_records) + "\n];"

    js_path = "ndvi_data_js.txt"
    with open(js_path, "w", encoding="utf-8") as f:
        f.write("// نسخ هذا الكود ولصقه في الداشبورد بدلاً من مصفوفة D الموجودة\n")
        f.write(f"// تاريخ التحديث: {datetime.now().strftime('%Y-%m-%d %H:%M')}\n\n")
        f.write(js_array)
    print(f"✅ تم توليد ملف JavaScript: {js_path}")

    # ملخص إحصائي
    print(f"\n{'='*60}")
    print("ملخص البيانات:")
    print(f"{'='*60}")
    for pivot in PIVOTS.keys():
        pdata = df[df["pivot"] == pivot]
        if len(pdata) > 0:
            print(f"  {pivot:15} | قراءات: {len(pdata):3} | "
                  f"NDVI آخر: {pdata.iloc[-1]['ndvi']:.2f} | "
                  f"متوسط: {pdata['ndvi'].mean():.2f} | "
                  f"أعلى: {pdata['ndvi'].max():.2f}")
        else:
            print(f"  {pivot:15} | لا توجد بيانات")

    return df


